<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lino Salon — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8963E;
    --gold-light: #D4AF6A;
    --gold-pale: #FBF7EF;
    --dark: #141210;
    --dark2: #1E1A16;
    --cream: #F9F5EF;
    --text: #1E1A16;
    --muted: #9A8F82;
    --border: rgba(184,150,62,0.18);
    --white: #FFFFFF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .page-wrap { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; }
  .widget { width: 100%; background: var(--white); border-radius: 24px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 8px 48px rgba(184,150,62,0.1); }
  .header { background: var(--dark); padding: 20px; display: flex; align-items: center; gap: 14px; }
  .logo-circle { width: 44px; height: 44px; border: 1.5px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-text { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--gold); }
  .header-info { flex: 1; }
  .header-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; color: #F9F5EF; letter-spacing: 0.04em; }
  .header-sub { font-size: 11px; color: var(--gold-light); margin-top: 2px; font-weight: 300; }
  .live-dot { width: 7px; height: 7px; background: #5EC97A; border-radius: 50%; animation: livepulse 2s infinite; }
  @keyframes livepulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .chat { height: 390px; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 12px; background: var(--cream); }
  .chat::-webkit-scrollbar { width: 3px; }
  .chat::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 4px; }
  .msg { display: flex; gap: 8px; align-items: flex-end; animation: popin 0.28s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popin { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: none; } }
  .msg.user { flex-direction: row-reverse; }
  .msg-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
  .msg.ai .msg-icon { background: var(--dark); color: var(--gold); font-family: 'Cormorant Garamond', serif; font-size: 13px; }
  .msg.user .msg-icon { background: var(--gold); color: white; font-family: 'DM Sans', sans-serif; }
  .bubble { max-width: 80%; padding: 11px 15px; font-size: 13.5px; line-height: 1.6; font-weight: 300; }
  .msg.ai .bubble { background: var(--white); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; color: var(--text); }
  .msg.user .bubble { background: var(--dark); border-radius: 16px 16px 4px 16px; color: #F9F5EF; }
  .typing-bubble { background: var(--white); border: 1px solid var(--border); border-radius: 16px 16px 16px 4px; padding: 13px 16px; display: flex; gap: 4px; align-items: center; }
  .dot { width: 5px; height: 5px; background: var(--gold-light); border-radius: 50%; animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 60%, 100% { opacity: 0.3; transform: scale(1); } 30% { opacity: 1; transform: scale(1.3); } }
  .quick-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 36px; }
  .quick { background: var(--white); border: 1px solid var(--border); color: var(--gold); padding: 5px 12px; border-radius: 99px; font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .quick:hover { background: var(--gold-pale); border-color: var(--gold); }
  .input-bar { background: var(--white); border-top: 1px solid var(--border); padding: 12px 14px; display: flex; gap: 8px; align-items: flex-end; }
  .input-box { flex: 1; background: var(--cream); border: 1px solid var(--border); border-radius: 12px; padding: 9px 14px; display: flex; align-items: center; transition: border-color 0.2s; }
  .input-box:focus-within { border-color: var(--gold-light); }
  textarea { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 300; color: var(--text); resize: none; max-height: 90px; line-height: 1.5; }
  textarea::placeholder { color: var(--muted); }
  .send { width: 38px; height: 38px; background: var(--dark); border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .send:hover { background: var(--dark2); transform: scale(1.05); }
  .send svg { width: 15px; height: 15px; fill: var(--gold); }
  .footer { text-align: center; font-size: 11px; color: var(--muted); margin-top: 12px; }
  .footer span { color: var(--gold); font-weight: 500; }
  .error-bubble { background: #FFF0F0; border: 1px solid #F0C0C0; border-radius: 16px 16px 16px 4px; padding: 10px 14px; font-size: 13px; color: #A32D2D; max-width: 80%; line-height: 1.5; }
</style>
</head>
<body>
<div class="page-wrap">
  <div class="widget">
    <div class="header">
      <div class="logo-circle"><span class="logo-text">L</span></div>
      <div class="header-info">
        <div class="header-name">Lino Salon</div>
        <div class="header-sub">Troy, MI • Hair, Color & Beauty</div>
      </div>
      <div class="live-dot"></div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-bar">
      <div class="input-box">
        <textarea id="userInput" placeholder="Ask me anything about Lino Salon..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
      </button>
    </div>
  </div>
  <div class="footer">AI assistant for <span>Lino Salon</span> • Available 24/7</div>
</div>

<script>
const API_KEY = 'YOUR_ACTUAL_KEY_HERE';

const SYSTEM = `You are an AI assistant for Lino Salon, a family hair and beauty salon located at 3636 Rochester Rd, Troy, MI 48084.

Phone: (248) 817-6884
Website: linosalon.net
Instagram: @linosalon

Hours:
Monday: 11am-6pm
Tuesday: 10am-7pm
Wednesday: 10am-7pm
Thursday: 10am-5pm
Friday: 9am-6pm
Saturday: 9am-5pm
Sunday: Closed

Services & Pricing:
Haircuts & Blowdry: starting at $45
Hair Color: starting at $85
Balayage: starting at $150
Highlights: starting at $170
Extensions Full Install: starting at $250
Extensions Move Up: starting at $120
Updo & Down Styles: starting at $95
Braids: starting at $35
Brow Services: starting at $30
Makeup: starting at $95

Booking: Call (248) 817-6884. No DMs for appointments.

Be warm, friendly and keep replies to 2-3 sentences. Always guide customers toward calling to book.`;

let history = [];
let quickShown = false;

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = role === 'ai' ? 'L' : 'You';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(icon);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addError(text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'L';
  const err = document.createElement('div');
  err.className = 'error-bubble';
  err.textContent = text;
  div.appendChild(icon);
  div.appendChild(err);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing';
  const icon = document.createElement('div');
  icon.className = 'msg-icon';
  icon.textContent = 'L';
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  div.appendChild(icon);
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function showQuickReplies() {
  if (quickShown) return;
  quickShown = true;
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'quick-wrap';
  wrap.id = 'quickReplies';
  const options = ['Book appointment', 'Pricing', 'Opening hours', 'Balayage info', 'Location'];
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quick';
    btn.textContent = o;
    btn.onclick = () => {
      document.getElementById('quickReplies')?.remove();
      document.getElementById('userInput').value = o;
      send();
    };
    wrap.appendChild(btn);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

async function callGemini(userMsg) {
  history.push({ role: 'user', parts: [{ text: userMsg }] });
  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-lite:generateContent?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SYSTEM }] },
      contents: history,
      generationConfig: { maxOutputTokens: 200, temperature: 0.7 }
    })
  });
  if (!response.ok) {
    const err = await response.json();
    throw new Error(err.error?.message || 'API error');
  }
  const data = await response.json();
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, could you try again?";
  history.push({ role: 'model', parts: [{ text: reply }] });
  return reply;
}

async function send() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  showTyping();
  try {
    const reply = await callGemini(text);
    removeTyping();
    addMsg('ai', reply);
  } catch(e) {
    removeTyping();
    if (e.message.includes('quota') || e.message.includes('RESOURCE_EXHAUSTED')) {
      addError('Our assistant is resting — please call us directly at (248) 817-6884!');
    } else {
      addError('Something went wrong — please call us at (248) 817-6884.');
    }
  }
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 90) + 'px';
}

async function init() {
  showTyping();
  try {
    const reply = await callGemini('Hi, I just found Lino Salon online!');
    removeTyping();
    addMsg('ai', reply);
    showQuickReplies();
  } catch(e) {
    removeTyping();
    addMsg('ai', "Welcome to Lino Salon! I'm here to help with pricing, hours, bookings and more. What can I help you with today?");
    showQuickReplies();
  }
}

init();
</script>
</body>
</html>
